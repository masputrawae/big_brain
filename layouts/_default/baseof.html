<!DOCTYPE html>
<html 
lang="{{ site.Language.LanguageCode }}" 
dir="{{ or site.Language.LanguageDirection `ltr` }}" 
data-theme="dark">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="layout">
    <div class="u-container layout__left" id="leftSide">
      {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
    </div>
    <div class="u-container layout__main">
      <div class="main-wrapper">
        {{ partial "topbar.html" . }}
        {{ partial "breadcrumbs.html" . }}
        {{ block "main" . }}{{ end }}
        {{ partial "footer.html" . }}
      </div>
    </div>
    <div class="u-container layout__right" id="rightSide">
      {{ partial "panel.html" . }}
    </div>
  </div>
</body>
</html>
