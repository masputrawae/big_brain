{{ define "main" }}
<main class="main">
  <div class="main__layout">
    <article class="markdown">
      {{ .Content | safeHTML }}
    </article>
  </div>

  <div class="main__layout main__layout--grid">
    {{ if eq .Kind "term" }}
      {{ partial "content/content-list.html" . }}
    {{ else }}
      {{ partial "content/taxonomy-cloud.html" . }}
    {{ end }}
  </div>
</main>
{{ end }}
