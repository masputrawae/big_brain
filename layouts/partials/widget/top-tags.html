<!-- |===========| START: TOP TAGS |===========| -->
<nav class="navbar navbar--widget">

  <div class="navbar__label">
    <i class="bi bi-tags"></i>
    <span>Top 5 Tags</span>
  </div>

  {{ $tags := .Site.Taxonomies.tags }}
  {{ $topTags := $tags.ByCount | first 5 }}

  <ul class="nav nav--widget">
    {{ range $topTags }}
      <li class="nav__item">
        <a href="{{ .Page.Permalink }}" class="nav__link">
          {{ .Term }}
        </a>
      </li>
    {{ end }}
  </ul>

</nav>
<!-- |===========| END: TOP TAGS |===========| -->
