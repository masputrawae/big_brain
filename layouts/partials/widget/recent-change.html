<!-- |===========| START: RECENT CHANGE |===========| -->
{{ $recent := .Site.RegularPages | first 5 }}
{{ if $recent }}
<nav class="navbar navbar--widget">
  <div class="navbar__label">News</div>
  <ul class="nav nav--widget">
    {{ range $recent }}
      <li class="nav__item">
        <a href="{{ .RelPermalink }}" class="nav__link">
          {{ .Title }}
        </a>
      </li>
    {{ end }}
  </ul>
</nav>
{{ end }}
<!-- |===========| END: RECENT CHANGE |===========| -->
